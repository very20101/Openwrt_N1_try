# Description: Use Releases file to packaging
# Code modified from https://github.com/quanjindeng/Actions_OpenWrt-Amlogic
#========================================================================================================================

name: Pack_OpWrt_Minik_New

on:
  repository_dispatch:
  workflow_dispatch:
  
  schedule:
    - cron: 40 18 */21 * *
env:
   
  OPENWRT_TAG: ARMv8_MiniNK_New_Ext
  TZ: Asia/Shanghai 
    
jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        #docker rmi $(docker images -q)
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204)
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"
        
    
    - name: Download Armsr(Armvirt) Firmware
      id: download
      run: |
        FIRMWARE_PATH=openwrt/bin/targets/armsr/64
        [ -d $FIRMWARE_PATH ] || mkdir -p $FIRMWARE_PATH
        wget -q -P $FIRMWARE_PATH https://github.com/very20101/Openwrt_N1_try/releases/download/ARMv8_MiniNK_New_Ext/openwrt-armsr-armv8-generic-rootfs.tar.gz
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date +"%Y.%m.%d")" >> $GITHUB_ENV
 
    - name: Package armsr-armv8 as OpenWrt
      if: steps.download.outputs.status == 'success'
      uses: ophub/amlogic-s9xxx-openwrt@main
      with:
        openwrt_path: openwrt/bin/targets/*/*/*rootfs.tar.gz
        openwrt_board: s905d
        openwrt_kernel: 6.1.y_6.6.y_6.12.y_6.18.y
        builder_name: very20101
        auto_kernel: true
        openwrt_ip: 192.168.1.100
        
    - name: Upload OpenWrt To Release
      uses: ncipollo/release-action@v1
      with:
        name: ARMv8-MiniNK_New_Ext
        allowUpdates: true
        removeArtifacts: true
        tag: ${{ env.OPENWRT_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
        body: |
          **This is OpenWrt Firmware for Armvirt 64**
          * 这是 ARMv8 精简版
          默认 IP：192.168.1.100 默认密码：password
          安装到 EMMC：系统 → 晶晨宝盒 → 安装 OpenWrt → 选择型号 → 安装
          升级 OpenWrt：系统 → 晶晨宝盒 → 手动上传更新 或者 在线下载更新
          当前使用版本:【编译前的最后一次➦[主源码](https://github.com/openwrt/openwrt)更新记录】
          ${{ env.VERSION_INFO }}
